version: "2"

run:
  go: "1.26"
  timeout: 5m
  tests: true
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - misspell
    - revive
    - unused
    - ineffassign
    - copyloopvar
    - forbidigo

  exclusions:
    paths:
      - fiken # ogen-generated package
      - ".*\\.gen\\.go$"

  settings:
    forbidigo:
      forbid:
        - pattern: '\bptr\.To\b'
          msg: "use `new(T)` or `&value` (Go 1.26)"
      analyze-types: true

formatters:
  enable:
    - gofumpt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/kradalby/fiken-go

  exclusions:
    paths:
      - fiken
      - ".*\\.gen\\.go$"
