# fiken-go runtime English catalog.
# Keys organized by surface:
#   ops.<op>.{summary,when_to_use,returns,example}
#   ops.<op>.flags.<flag>
#   auth.<subcmd>.<msg>
#   error.<code>

[ops.companies_list]
summary     = "List all companies the authenticated user has access to."
when_to_use = "Use to discover available company slugs before any company-scoped op (e.g. invoices, contacts)."
returns     = "Object with `items` (each: slug, name, organizationNumber) and pagination meta."
example     = "fiken companies list"

[ops.companies_get]
summary     = "Get a single company by slug."
when_to_use = "Use when you have a slug and need company-level fields (organization number, address, locale)."
returns     = "Company object with name, slug, organizationNumber, address, defaultLanguage."
example     = "fiken companies get --company my-co"

[ops.companies_get.flags]
company = "Slug of the company to fetch. Required. Example: --company=acme-as"

[ops.contacts_list]
summary     = "List contacts for a company."
when_to_use = "Use to find a contact_id before invoicing, attaching files, or fetching contact persons."
returns     = "Object with `items` (each: contact_id, name, email, organization_number, currency, language, customer, supplier, inactive) and pagination meta."
example     = "fiken contacts list --company acme"

[ops.contacts_list.flags]
company   = "Slug of the company to query. Required. Example: --company=acme-as"
page      = "Page number (0-indexed). Example: --page=2"
page_size = "Page size (max 100). Example: --page-size=50"

[ops.contacts_get]
summary     = "Get a single contact by id."
when_to_use = "Use when you already have a contact_id and need the full contact record."
returns     = "Contact object with contact_id, name, email, phone_number, organization_number, currency, language, customer, supplier, inactive."
example     = "fiken contacts get --company acme --contact-id 42"

[ops.contacts_get.flags]
company    = "Slug of the company that owns the contact. Required. Example: --company=acme-as"
contact_id = "Numeric id of the contact to fetch. Required. Example: --contact-id=42"

[ops.contacts_create]
summary     = "Create a new contact. (Stub: not yet implemented in Plan C Task 1.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Created Contact (when implemented)."
example     = "fiken contacts create --company acme  # not yet wired"

[ops.contacts_create.flags]
company = "Slug of the company that owns the contact. Required."

[ops.contacts_update]
summary     = "Update an existing contact. (Stub: not yet implemented in Plan C Task 1.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Updated Contact (when implemented)."
example     = "fiken contacts update --company acme --contact-id 42  # not yet wired"

[ops.contacts_update.flags]
company    = "Slug of the company that owns the contact. Required."
contact_id = "Numeric id of the contact to update. Required."

[ops.contacts_delete]
summary     = "Delete or deactivate a contact. (Stub: not yet implemented in Plan C Task 1.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Empty success envelope (when implemented). If the contact has bound records, Fiken sets it inactive instead of deleting."
example     = "fiken contacts delete --company acme --contact-id 42  # not yet wired"

[ops.contacts_delete.flags]
company    = "Slug of the company that owns the contact. Required."
contact_id = "Numeric id of the contact to delete. Required."

[ops.contacts_persons_list]
summary     = "List the contact persons attached to a contact."
when_to_use = "Use to find a contact_person_id before addressing invoices/offers to a named person."
returns     = "Object with `items` (each: contact_person_id, name, email, phone_number) and a minimal meta."
example     = "fiken contacts persons list --company acme --contact-id 42"

[ops.contacts_persons_list.flags]
company    = "Slug of the company. Required. Example: --company=acme-as"
contact_id = "Numeric id of the parent contact. Required. Example: --contact-id=42"

[ops.contacts_persons_get]
summary     = "Get a single contact person."
when_to_use = "Use when you have a contact_person_id and need its full record."
returns     = "ContactPerson object with contact_person_id, name, email, phone_number."
example     = "fiken contacts persons get --company acme --contact-id 42 --contact-person-id 7"

[ops.contacts_persons_get.flags]
company           = "Slug of the company. Required."
contact_id        = "Numeric id of the parent contact. Required."
contact_person_id = "Numeric id of the contact person. Required."

[ops.contacts_persons_create]
summary     = "Add a contact person to a contact. (Stub: not yet implemented in Plan C Task 1.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Created ContactPerson (when implemented)."
example     = "fiken contacts persons create --company acme --contact-id 42  # not yet wired"

[ops.contacts_persons_create.flags]
company    = "Slug of the company. Required."
contact_id = "Numeric id of the parent contact. Required."

[ops.contacts_persons_update]
summary     = "Update a contact person. (Stub: not yet implemented in Plan C Task 1.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Updated ContactPerson (when implemented)."
example     = "fiken contacts persons update --company acme --contact-id 42 --contact-person-id 7  # not yet wired"

[ops.contacts_persons_update.flags]
company           = "Slug of the company. Required."
contact_id        = "Numeric id of the parent contact. Required."
contact_person_id = "Numeric id of the contact person. Required."

[ops.contacts_persons_delete]
summary     = "Delete a contact person. (Stub: not yet implemented in Plan C Task 1.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Empty success envelope (when implemented)."
example     = "fiken contacts persons delete --company acme --contact-id 42 --contact-person-id 7  # not yet wired"

[ops.contacts_persons_delete.flags]
company           = "Slug of the company. Required."
contact_id        = "Numeric id of the parent contact. Required."
contact_person_id = "Numeric id of the contact person. Required."

[ops.accounts_list]
summary     = "List bookkeeping accounts for a company."
when_to_use = "Use to discover account codes (e.g. 3020, 1500:10001) before posting transactions or filtering ledgers."
returns     = "Object with `items` (each: code, name) and pagination meta."
example     = "fiken accounts list --company acme --range 3000-3999"

[ops.accounts_list.flags]
company      = "Slug of the company to query. Required. Example: --company=acme-as"
page         = "Page number (0-indexed). Example: --page=2"
page_size    = "Page size (max 100). Example: --page-size=50"
from_account = "Lower bound account number (excluding subaccount). Example: --from-account=3000"
to_account   = "Upper bound account number (excluding subaccount). Example: --to-account=3999"
range        = "Comma-separated codes or ranges. Example: --range=\"1000-1500,3020,7000-7004\""

[ops.accounts_get]
summary     = "Get a single bookkeeping account by code."
when_to_use = "Use when you already have an account code and need its canonical name."
returns     = "Account object with code and name."
example     = "fiken accounts get --company acme --account-code 3020"

[ops.accounts_get.flags]
company      = "Slug of the company that owns the account. Required. Example: --company=acme-as"
account_code = "Account code (four digits, optionally with `:<sub>` reskontro suffix). Required. Example: --account-code=1500:10001"

[ops.bank_accounts_list]
summary     = "List bank accounts for a company."
when_to_use = "Use to discover bank_account_id values, IBANs, or balances before reconciling or posting payments."
returns     = "Object with `items` (each: bank_account_id, name, account_code, bank_account_number, iban, bic, foreign_service, type, reconciled_balance in øre, reconciled_date, inactive) and pagination meta."
example     = "fiken bank-accounts list --company acme"

[ops.bank_accounts_list.flags]
company   = "Slug of the company to query. Required. Example: --company=acme-as"
page      = "Page number (0-indexed). Example: --page=2"
page_size = "Page size (max 100). Example: --page-size=50"
inactive  = "Return inactive bank accounts instead of active. Example: --inactive"

[ops.bank_accounts_get]
summary     = "Get a single bank account by id."
when_to_use = "Use when you already have a bank_account_id and need the full account record (number, balance, type)."
returns     = "BankAccount object with bank_account_id, name, account_code, bank_account_number, iban, bic, foreign_service, type, reconciled_balance (øre), reconciled_date, inactive."
example     = "fiken bank-accounts get --company acme --bank-account-id 2747365"

[ops.bank_accounts_get.flags]
company         = "Slug of the company that owns the bank account. Required. Example: --company=acme-as"
bank_account_id = "Numeric id of the bank account. Required. Example: --bank-account-id=2747365"

[ops.bank_accounts_create]
summary     = "Create a new bank account. (Stub: not yet implemented in Plan C.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Created BankAccount (when implemented)."
example     = "fiken bank-accounts create --company acme  # not yet wired"

[ops.bank_accounts_create.flags]
company = "Slug of the company that owns the bank account. Required."

[ops.journal_entries_list]
summary     = "List journal entries for a company."
when_to_use = "Use to inspect the company's general-ledger postings, optionally filtered by date or last-modified bounds."
returns     = "Object with `items` (each: journal_entry_id, journal_entry_number, description, transaction_date, transaction_id, lines[]) and pagination meta. Line amounts are int64 øre."
example     = "fiken journal-entries list --company acme --date-ge 2024-01-01 --date-le 2024-01-31"

[ops.journal_entries_list.flags]
company          = "Slug of the company to query. Required. Example: --company=acme-as"
page             = "Page number (0-indexed). Example: --page=2"
page_size        = "Page size (max 100). Example: --page-size=50"
date             = "Filter by exact posting date (YYYY-MM-DD). Example: --date=2024-03-01"
date_le          = "Filter posting date <= value. Example: --date-le=2024-12-31"
date_lt          = "Filter posting date < value."
date_ge          = "Filter posting date >= value."
date_gt          = "Filter posting date > value."
last_modified    = "Filter by exact last-modified date."
last_modified_le = "Filter last-modified <= value."
last_modified_lt = "Filter last-modified < value."
last_modified_ge = "Filter last-modified >= value."
last_modified_gt = "Filter last-modified > value."
created_date     = "Filter by exact created date."
created_date_le  = "Filter created-date <= value."
created_date_lt  = "Filter created-date < value."
created_date_ge  = "Filter created-date >= value."
created_date_gt  = "Filter created-date > value."

[ops.journal_entries_get]
summary     = "Get a single journal entry by id."
when_to_use = "Use when you already have a journal_entry_id and need the full posting with its line items and attachment metadata."
returns     = "JournalEntry object with journal_entry_id, journal_entry_number, description, transaction_date, transaction_id, offset_transaction_id, lines[] (amount øre, account, vat_code), and attachments[]."
example     = "fiken journal-entries get --company acme --journal-entry-id 1234"

[ops.journal_entries_get.flags]
company          = "Slug of the company that owns the entry. Required."
journal_entry_id = "Numeric id of the journal entry. Required. Example: --journal-entry-id=1234"

[ops.journal_entries_create]
summary     = "Create a general journal entry (fri postering). (Stub: not yet implemented in Plan C Task 4.)"
when_to_use = "Reserved for follow-up Plan C task; currently returns internal/not-implemented."
returns     = "Created JournalEntry (when implemented)."
example     = "fiken journal-entries create --company acme  # not yet wired"

[ops.journal_entries_create.flags]
company = "Slug of the company. Required."

[ops.journal_entries_attachments_list]
summary     = "List attachments for a journal entry."
when_to_use = "Use to discover identifiers, download URLs, or types of files attached to a specific journal entry."
returns     = "Object with `items` (each: identifier, download_url, comment, type) and a minimal meta."
example     = "fiken journal-entries attachments --company acme --journal-entry-id 1234"

[ops.journal_entries_attachments_list.flags]
company          = "Slug of the company. Required."
journal_entry_id = "Numeric id of the journal entry. Required."

[ops.journal_entries_attachments_attach]
summary     = "Attach a file to a journal entry. (Stub: multipart upload wires in Plan D.)"
when_to_use = "Reserved for Plan D; currently returns internal/not-implemented. MCP exposes this tool only when EnableAttachments is set."
returns     = "Location URL of the created attachment (when implemented)."
example     = "fiken journal-entries attach --company acme --journal-entry-id 1234 --file ./invoice.pdf  # not yet wired"

[ops.journal_entries_attachments_attach.flags]
company          = "Slug of the company. Required."
journal_entry_id = "Numeric id of the journal entry. Required."
filename         = "Override filename (defaults to basename of --file)."
file             = "Local file path to upload. Required."

[ops.transactions_list]
summary     = "List transactions for a company."
when_to_use = "Use to enumerate posted transactions (sales, purchases, journal entries) for the company, optionally filtered by created or last-modified date."
returns     = "Object with `items` (each: transaction_id, type, description, created_date, last_modified_date, deleted, entries[]) and pagination meta. Each entry mirrors a JournalEntry with int64 øre line amounts."
example     = "fiken transactions list --company acme --created-date-ge 2024-01-01"

[ops.transactions_list.flags]
company          = "Slug of the company to query. Required. Example: --company=acme-as"
page             = "Page number (0-indexed). Example: --page=2"
page_size        = "Page size (max 100). Example: --page-size=50"
last_modified    = "Filter by exact last-modified date (YYYY-MM-DD)."
last_modified_le = "Filter last-modified <= value."
last_modified_lt = "Filter last-modified < value."
last_modified_ge = "Filter last-modified >= value."
last_modified_gt = "Filter last-modified > value."
created_date     = "Filter by exact created date."
created_date_le  = "Filter created-date <= value."
created_date_lt  = "Filter created-date < value."
created_date_ge  = "Filter created-date >= value."
created_date_gt  = "Filter created-date > value."

[ops.transactions_get]
summary     = "Get a single transaction by id."
when_to_use = "Use when you already have a transaction_id (returned from sales, purchases, or journal-entry responses) and need the full ledger event with its associated journal entries."
returns     = "Transaction object with transaction_id, type, description, created_date, last_modified_date, deleted, and entries[] (each a JournalEntry shape with int64 øre line amounts)."
example     = "fiken transactions get --company acme --transaction-id 9988"

[ops.transactions_get.flags]
company        = "Slug of the company that owns the transaction. Required."
transaction_id = "Numeric id of the transaction. Required. Example: --transaction-id=9988"

[ops.invoices_list]
summary     = "List invoices for a company."
when_to_use = "Use to enumerate issued invoices, optionally filtered by issue/due/last-modified bounds, customer, settlement state, or order reference."
returns     = "Object with `items` (each: invoice_id, invoice_number, issue_date, due_date, gross/net/vat in int64 øre, customer_id/name, lines[], attachments[]) and pagination meta."
example     = "fiken invoices list --company acme --issue-date-ge 2024-01-01 --settled=false"

[ops.invoices_list.flags]
company            = "Slug of the company to query. Required. Example: --company=acme-as"
page               = "Page number (0-indexed)."
page_size          = "Page size (max 100)."
issue_date         = "Filter by exact issue date (YYYY-MM-DD)."
issue_date_le      = "Filter issue-date <= value."
issue_date_lt      = "Filter issue-date < value."
issue_date_ge      = "Filter issue-date >= value."
issue_date_gt      = "Filter issue-date > value."
last_modified      = "Filter by exact last-modified date."
last_modified_le   = "Filter last-modified <= value."
last_modified_lt   = "Filter last-modified < value."
last_modified_ge   = "Filter last-modified >= value."
last_modified_gt   = "Filter last-modified > value."
due_date           = "Filter by exact due date."
due_date_le        = "Filter due-date <= value."
due_date_lt        = "Filter due-date < value."
due_date_ge        = "Filter due-date >= value."
due_date_gt        = "Filter due-date > value."
customer_id        = "Filter by customer contact id."
settled            = "Filter to settled invoices."
order_reference    = "Filter by order reference."
invoice_draft_uuid = "Filter by source draft UUID."
invoice_number     = "Filter by exact invoice number string."

[ops.invoices_get]
summary     = "Get a single invoice by id."
when_to_use = "Use when you have an invoice_id (returned from list, drafts, or sale flows) and need the full document including lines, attachments, and customer."
returns     = "Invoice object with invoice_id, invoice_number, issue/due dates, gross/net/vat int64 øre, lines[], attachments[], and flattened customer_id/name."
example     = "fiken invoices get --company acme --invoice-id 1234"

[ops.invoices_get.flags]
company    = "Slug of the company that owns the invoice. Required."
invoice_id = "Numeric id of the invoice (not the invoice number). Required."

[ops.invoices_send]
summary     = "Send an invoice to its customer. (Stub: mutating wiring lands in a follow-up Plan C task.)"
when_to_use = "Reserved for follow-up task; currently returns internal/not-implemented."
returns     = "Empty success envelope (when implemented)."
example     = "fiken invoices send --company acme --invoice-id 1234  # not yet wired"

[ops.invoices_send.flags]
company    = "Slug of the company. Required."
invoice_id = "Numeric id of the invoice to send. Required."

[ops.invoices_counter_create]
summary     = "Initialize the invoice counter for the fiscal year. (Stub: mutating wiring lands in a follow-up Plan C task.)"
when_to_use = "Reserved for follow-up task; currently returns internal/not-implemented."
returns     = "Counter value (when implemented)."
example     = "fiken invoices counter create --company acme --value 1000  # not yet wired"

[ops.invoices_counter_create.flags]
company = "Slug of the company. Required."
value   = "Starting counter value. Required."

[ops.invoices_drafts_list]
summary     = "List invoice drafts for a company."
when_to_use = "Use to enumerate drafts (unposted invoices and credit notes) before promotion, optionally filtered by order reference or UUID."
