[ops.journal_entries_list.flags]
company          = "Slug for selskapet det skal søkes i. Påkrevd. Eksempel: --company=acme-as"
page             = "Sidetall (0-indeksert). Eksempel: --page=2"
page_size        = "Sidestørrelse (maks 100). Eksempel: --page-size=50"
date             = "Filtrer på eksakt posteringsdato (YYYY-MM-DD). Eksempel: --date=2024-03-01"
