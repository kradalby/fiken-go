date_lt          = "Filtrer posteringsdato < verdi."
date_ge          = "Filtrer posteringsdato >= verdi."
date_gt          = "Filtrer posteringsdato > verdi."
last_modified    = "Filtrer på eksakt sist-endret-dato."
last_modified_le = "Filtrer sist-endret <= verdi."
last_modified_lt = "Filtrer sist-endret < verdi."
last_modified_ge = "Filtrer sist-endret >= verdi."
last_modified_gt = "Filtrer sist-endret > verdi."
created_date     = "Filtrer på eksakt opprettet-dato."
created_date_le  = "Filtrer opprettet-dato <= verdi."
created_date_lt  = "Filtrer opprettet-dato < verdi."
created_date_ge  = "Filtrer opprettet-dato >= verdi."
created_date_gt  = "Filtrer opprettet-dato > verdi."

[ops.journal_entries_get]
summary     = "Hent én journalpost via id."
when_to_use = "Brukes når du allerede har en journal_entry_id og trenger hele posten med linjer og vedlegg-metadata."
returns     = "JournalEntry-objekt med journal_entry_id, journal_entry_number, beskrivelse, transaksjonsdato, transaksjons-id, offset_transaction_id, lines[] (amount øre, account, vat_code) og attachments[]."
