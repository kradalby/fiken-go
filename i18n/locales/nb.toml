# fiken-go runtime bokmål catalog.

[ops.companies_list]
summary     = "List alle selskap brukeren har tilgang til."
when_to_use = "Brukes for å finne tilgjengelige selskap-slugger før du kjører selskap-spesifikke operasjoner (fakturaer, kontakter osv.)."
returns     = "Objekt med `items` (hver: slug, navn, organisasjonsnummer) og paginerings-metadata."
example     = "fiken companies list"

[ops.companies_get]
summary     = "Hent ett selskap via slug."
when_to_use = "Brukes når du har en slug og trenger selskap-felter (organisasjonsnummer, adresse, språk)."
returns     = "Selskap-objekt med navn, slug, organisasjonsnummer, adresse, standardspråk."
example     = "fiken companies get --company my-co"

[ops.companies_get.flags]
company = "Slug for selskapet som skal hentes. Påkrevd. Eksempel: --company=acme-as"

[ops.contacts_list]
summary     = "List kontakter for et selskap."
when_to_use = "Brukes for å finne en contact_id før du fakturerer, knytter vedlegg eller henter kontaktpersoner."
returns     = "Objekt med `items` (hver: contact_id, navn, e-post, organisasjonsnummer, valuta, språk, kunde, leverandør, inaktiv) og paginerings-metadata."
example     = "fiken contacts list --company acme"

[ops.contacts_list.flags]
company   = "Slug for selskapet det skal søkes i. Påkrevd. Eksempel: --company=acme-as"
page      = "Sidetall (0-indeksert). Eksempel: --page=2"
page_size = "Sidestørrelse (maks 100). Eksempel: --page-size=50"

[ops.contacts_get]
summary     = "Hent én kontakt via id."
when_to_use = "Brukes når du allerede har en contact_id og trenger hele kontakt-posten."
returns     = "Kontakt-objekt med contact_id, navn, e-post, telefonnummer, organisasjonsnummer, valuta, språk, kunde, leverandør, inaktiv."
example     = "fiken contacts get --company acme --contact-id 42"

[ops.contacts_get.flags]
company    = "Slug for selskapet som eier kontakten. Påkrevd. Eksempel: --company=acme-as"
contact_id = "Numerisk id for kontakten som skal hentes. Påkrevd. Eksempel: --contact-id=42"

[ops.contacts_create]
summary     = "Lag en ny kontakt. (Stub: ikke implementert i Plan C oppgave 1.)"
when_to_use = "Reservert for senere Plan C-oppgave; gir for øyeblikket internal/not-implemented."
returns     = "Opprettet Kontakt (når implementert)."
example     = "fiken contacts create --company acme  # ikke koblet enda"

[ops.contacts_create.flags]
company = "Slug for selskapet som eier kontakten. Påkrevd."

[ops.contacts_update]
summary     = "Oppdater en eksisterende kontakt. (Stub: ikke implementert i Plan C oppgave 1.)"
when_to_use = "Reservert for senere Plan C-oppgave; gir for øyeblikket internal/not-implemented."
returns     = "Oppdatert Kontakt (når implementert)."
example     = "fiken contacts update --company acme --contact-id 42  # ikke koblet enda"

[ops.contacts_update.flags]
company    = "Slug for selskapet som eier kontakten. Påkrevd."
contact_id = "Numerisk id for kontakten som skal oppdateres. Påkrevd."

[ops.contacts_delete]
summary     = "Slett eller deaktiver en kontakt. (Stub: ikke implementert i Plan C oppgave 1.)"
when_to_use = "Reservert for senere Plan C-oppgave; gir for øyeblikket internal/not-implemented."
returns     = "Tom suksess-envelope (når implementert). Hvis kontakten har tilknyttede poster, settes den som inaktiv i stedet for å slettes."
example     = "fiken contacts delete --company acme --contact-id 42  # ikke koblet enda"

[ops.contacts_delete.flags]
company    = "Slug for selskapet som eier kontakten. Påkrevd."
contact_id = "Numerisk id for kontakten som skal slettes. Påkrevd."

[ops.contacts_persons_list]
summary     = "List kontaktpersonene knyttet til en kontakt."
when_to_use = "Brukes for å finne en contact_person_id før du adresserer fakturaer/tilbud til en navngitt person."
returns     = "Objekt med `items` (hver: contact_person_id, navn, e-post, telefonnummer) og minimal meta."
example     = "fiken contacts persons list --company acme --contact-id 42"

[ops.contacts_persons_list.flags]
company    = "Slug for selskapet. Påkrevd. Eksempel: --company=acme-as"
contact_id = "Numerisk id for foreldrekontakten. Påkrevd. Eksempel: --contact-id=42"

[ops.contacts_persons_get]
summary     = "Hent én kontaktperson."
when_to_use = "Brukes når du har en contact_person_id og trenger hele posten."
returns     = "ContactPerson-objekt med contact_person_id, navn, e-post, telefonnummer."
