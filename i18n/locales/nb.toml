[ops.contacts_persons_get.flags]
company           = "Slug for selskapet. Påkrevd."
contact_id        = "Numerisk id for foreldrekontakten. Påkrevd."
contact_person_id = "Numerisk id for kontaktpersonen. Påkrevd."

