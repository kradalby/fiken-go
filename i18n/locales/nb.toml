[ops.sales_drafts_attachments_list]
summary     = "List vedlegg for et salgsutkast."
when_to_use = "Brukes for å finne identifikatorer og filtyper knyttet til et spesifikt salgsutkast."
returns     = "Objekt med `items` (hver: identifier, download_url, comment, type) og minimal meta."
example     = "fiken sales drafts attachments list --company acme --draft-id 1"

[ops.sales_drafts_attachments_list.flags]
company  = "Slug for selskapet. Påkrevd."
draft_id = "Numerisk id for utkastet. Påkrevd."

[ops.sales_drafts_attachments_attach]
summary     = "Legg ved en fil (PDF / bilde) på et salgsutkast."
when_to_use = "Brukes for å laste opp støttedokumenter for et upostet salgsutkast."
returns     = "Location-URL for det nye vedlegget."
example     = "fiken sales drafts attachments attach --company acme --draft-id 1 --file ./doc.pdf"

[ops.sales_drafts_attachments_attach.flags]
company  = "Slug for selskapet. Påkrevd."
draft_id = "Numerisk id for utkastet. Påkrevd."
file     = "Lokal filsti som skal lastes opp. Påkrevd."
filename = "Overstyr filnavn (standard er basename av --file)."

[ops.purchases_drafts_list]
summary     = "List kjøpsutkast for et selskap."
when_to_use = "Brukes for å vise kontant- og kredittkjøp-utkast før promotering."
returns     = "Objekt med `items` (hver: draft_id, uuid, invoice_issue_date, contact_id, currency, lines[]) og pagineringsmeta."
example     = "fiken purchases drafts list --company acme"

[ops.purchases_drafts_list.flags]
company   = "Slug for selskapet. Påkrevd."
page      = "Sidetall (0-indeksert)."
page_size = "Sidestørrelse (maks 100)."

[ops.purchases_drafts_get]
summary     = "Hent ett kjøpsutkast via id."
when_to_use = "Brukes når du har en draft_id og trenger hele payload-en før redigering eller promotering."
returns     = "PurchaseDraft-objekt."
example     = "fiken purchases drafts get --company acme --draft-id 1"

[ops.purchases_drafts_get.flags]
company  = "Slug for selskapet. Påkrevd."
draft_id = "Numerisk id for utkastet. Påkrevd."

[ops.purchases_drafts_create]
summary     = "Lag et nytt kjøpsutkast."
when_to_use = "Brukes for å forberede et kjøp før det posteres som et endelig kjøp."
returns     = "Location-URL for det nye utkastet."
example     = "fiken purchases drafts create --company acme --from-file ./draft.json"

[ops.purchases_drafts_create.flags]
company   = "Slug for selskapet. Påkrevd."
from_file = "Sti til JSON-body som matcher draftRequest. Påkrevd."

[ops.purchases_drafts_update]
summary     = "Oppdater et eksisterende kjøpsutkast."
when_to_use = "Brukes for å redigere et kjøpsutkast på plass."
returns     = "Location-URL for det oppdaterte utkastet."
example     = "fiken purchases drafts update --company acme --draft-id 1 --from-file ./draft.json"

[ops.purchases_drafts_update.flags]
company   = "Slug for selskapet. Påkrevd."
draft_id  = "Numerisk id for utkastet som skal oppdateres. Påkrevd."
from_file = "Sti til JSON-body som matcher draftRequest. Påkrevd."

[ops.purchases_drafts_delete]
summary     = "Slett et kjøpsutkast."
when_to_use = "Brukes for å forkaste et upostet kjøpsutkast."
returns     = "Sletteflagg."
example     = "fiken purchases drafts delete --company acme --draft-id 1"

[ops.purchases_drafts_delete.flags]
company  = "Slug for selskapet. Påkrevd."
draft_id = "Numerisk id for utkastet som skal slettes. Påkrevd."

[ops.purchases_drafts_create_from]
summary     = "Promoter et kjøpsutkast til et postet kjøp."
when_to_use = "Brukes for å finalisere et kjøpsutkast etter at redigeringer er fullført."
returns     = "Location-URL for det nye kjøpet."
example     = "fiken purchases drafts create-from --company acme --draft-id 1"

[ops.purchases_drafts_create_from.flags]
company  = "Slug for selskapet. Påkrevd."
draft_id = "Numerisk id for kildeutkastet. Påkrevd."

