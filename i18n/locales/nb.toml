when_to_use = "Reservert for senere Plan C-oppgave; gir for øyeblikket internal/not-implemented."
returns     = "Opprettet ContactPerson (når implementert)."
example     = "fiken contacts persons create --company acme --contact-id 42  # ikke koblet enda"

[ops.contacts_persons_create.flags]
company    = "Slug for selskapet. Påkrevd."
contact_id = "Numerisk id for foreldrekontakten. Påkrevd."

[ops.contacts_persons_update]
summary     = "Oppdater en kontaktperson. (Stub: ikke implementert i Plan C oppgave 1.)"
when_to_use = "Reservert for senere Plan C-oppgave; gir for øyeblikket internal/not-implemented."
returns     = "Oppdatert ContactPerson (når implementert)."
example     = "fiken contacts persons update --company acme --contact-id 42 --contact-person-id 7  # ikke koblet enda"

[ops.contacts_persons_update.flags]
company           = "Slug for selskapet. Påkrevd."
contact_id        = "Numerisk id for foreldrekontakten. Påkrevd."
contact_person_id = "Numerisk id for kontaktpersonen. Påkrevd."

[ops.contacts_persons_delete]
summary     = "Slett en kontaktperson. (Stub: ikke implementert i Plan C oppgave 1.)"
when_to_use = "Reservert for senere Plan C-oppgave; gir for øyeblikket internal/not-implemented."
returns     = "Tom suksess-envelope (når implementert)."
example     = "fiken contacts persons delete --company acme --contact-id 42 --contact-person-id 7  # ikke koblet enda"

[ops.contacts_persons_delete.flags]
company           = "Slug for selskapet. Påkrevd."
contact_id        = "Numerisk id for foreldrekontakten. Påkrevd."
