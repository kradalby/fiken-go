[ops.accounts_list]
summary     = "List bokføringskontoer for et selskap."
when_to_use = "Brukes for å finne kontonumre (f.eks. 3020, 1500:10001) før du bokfører transaksjoner eller filtrerer hovedboken."
returns     = "Objekt med `items` (hver: code, name) og paginerings-metadata."
example     = "fiken accounts list --company acme --range 3000-3999"

[ops.accounts_list.flags]
company      = "Slug for selskapet det skal søkes i. Påkrevd. Eksempel: --company=acme-as"
page         = "Sidetall (0-indeksert). Eksempel: --page=2"
page_size    = "Sidestørrelse (maks 100). Eksempel: --page-size=50"
from_account = "Nedre grense for kontonummer (uten reskontro). Eksempel: --from-account=3000"
to_account   = "Øvre grense for kontonummer (uten reskontro). Eksempel: --to-account=3999"
range        = "Kommaseparerte koder eller intervaller. Eksempel: --range=\"1000-1500,3020,7000-7004\""

[ops.accounts_get]
summary     = "Hent én bokføringskonto via kode."
when_to_use = "Brukes når du allerede har en kontokode og trenger det kanoniske navnet."
returns     = "Konto-objekt med code og name."
example     = "fiken accounts get --company acme --account-code 3020"

[ops.accounts_get.flags]
company      = "Slug for selskapet som eier kontoen. Påkrevd. Eksempel: --company=acme-as"
account_code = "Kontokode (fire siffer, eventuelt med `:<reskontro>`-suffiks). Påkrevd. Eksempel: --account-code=1500:10001"

[ops.bank_accounts_list]
summary     = "List bankkontoer for et selskap."
when_to_use = "Brukes for å finne bank_account_id, IBAN eller saldo før avstemming eller bokføring av betalinger."
returns     = "Objekt med `items` (hver: bank_account_id, navn, account_code, bank_account_number, iban, bic, foreign_service, type, reconciled_balance i øre, reconciled_date, inaktiv) og paginerings-metadata."
example     = "fiken bank-accounts list --company acme"

[ops.bank_accounts_list.flags]
company   = "Slug for selskapet det skal søkes i. Påkrevd. Eksempel: --company=acme-as"
page      = "Sidetall (0-indeksert). Eksempel: --page=2"
page_size = "Sidestørrelse (maks 100). Eksempel: --page-size=50"
inactive  = "Returner inaktive bankkontoer i stedet for aktive. Eksempel: --inactive"

[ops.bank_accounts_get]
summary     = "Hent én bankkonto via id."
when_to_use = "Brukes når du allerede har en bank_account_id og trenger hele konto-posten (nummer, saldo, type)."
returns     = "BankAccount-objekt med bank_account_id, navn, account_code, bank_account_number, iban, bic, foreign_service, type, reconciled_balance (øre), reconciled_date, inaktiv."
example     = "fiken bank-accounts get --company acme --bank-account-id 2747365"

[ops.bank_accounts_get.flags]
company         = "Slug for selskapet som eier bankkontoen. Påkrevd. Eksempel: --company=acme-as"
bank_account_id = "Numerisk id for bankkontoen. Påkrevd. Eksempel: --bank-account-id=2747365"

[ops.bank_accounts_create]
summary     = "Lag en ny bankkonto. (Stub: ikke implementert i Plan C.)"
when_to_use = "Reservert for senere Plan C-oppgave; gir for øyeblikket internal/not-implemented."
returns     = "Opprettet BankAccount (når implementert)."
example     = "fiken bank-accounts create --company acme  # ikke koblet enda"

[ops.bank_accounts_create.flags]
company = "Slug for selskapet som eier bankkontoen. Påkrevd."

[ops.journal_entries_list]
summary     = "List bilag (journalposter) for et selskap."
when_to_use = "Brukes for å inspisere selskapets hovedbok-posteringer, eventuelt filtrert på dato eller sist-endret."
