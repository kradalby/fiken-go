summary     = "Hent én transaksjon via id."
when_to_use = "Brukes når du allerede har en transaction_id (returnert fra salg, kjøp eller journalpost-svar) og trenger hele ledger-hendelsen med tilhørende journalposter."
returns     = "Transaction-objekt med transaction_id, type, beskrivelse, opprettet-dato, sist-endret-dato, deleted, og entries[] (hver en JournalEntry-form med int64 øre linjebeløp)."
